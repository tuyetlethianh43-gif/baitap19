<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ - Bài tập</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #74ebd5, #9face6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 90%;
            max-width: 700px;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .2);
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .info {
            font-size: 20px;
            margin: 10px 0;
            color: #444;
        }

        .info span {
            font-weight: bold;
            color: #007bff;
        }

        img {
            width: 100%;
            max-width: 500px;
            margin: 25px 0;
            border-radius: 10px;
            border: 3px solid #ddd;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(0,0,0,.2);
        }

        a {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 25px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            transition: .3s;
        }

        a:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>TRANG CHỦ BÀI TẬP</h1>

        <p class="info">
            Họ và tên:
            <span>Lê Thị Ánh Tuyết</span>
        </p>

        <p class="info">
            Mã sinh viên:
            <span>241A301249</span>
        </p>

        <h3>Kết quả bài tập 17</h3>

        <!-- Đổi tên file ảnh theo đúng ảnh của bạn -->
        <img src="anh1.png" alt="Kết quả bài tập 17">
        <img src="anh2.png" alt="Kết quả bài tập 17">

        <br>

        <a href="baitap19.html">
            🎮 Mở Memory Card Flip Game (Bài tập 19)
        </a>

    </div>

</body>

</html>
