<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Matching Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        header, main, footer {
            width: 100%;
            max-width: 600px;
            text-align: center;
            margin-bottom: 20px;
        }
        .stats {
            font-size: 1.2rem;
            margin: 10px 0;
            font-weight: bold;
        }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        /* Grid Layout & Responsiveness */
        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Mobile: 2 cột */
            gap: 15px;
            perspective: 1000px; /* Hỗ trợ hiệu ứng 3D */
            margin-top: 20px;
        }
        @media (min-width: 768px) {
            .game-board {
                grid-template-columns: repeat(4, 1fr); /* Desktop: 4 cột */
            }
        }
        /* Card Styles & 3D Flip Animation */
        .card {
            height: 120px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
        }
        .card:hover {
            transform: scale(1.03); /* Hover effect */
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .card-front {
            background-color: #2b3a4a;
            color: white;
        }
        .card-back {
            background-color: #fff;
            transform: rotateY(180deg);
        }
    </style>
</head>
<body>

    <header>
        <h1>Trò Chơi Ghép Thẻ</h1>
    </header>

    <main>
        <div class="stats">Số lượt click: <span id="move-count">0</span></div>
        <button onclick="resetGame()">Chơi lại</button>
        
        <section class="game-board" id="board"></section>
    </main>

    <script>
        const cardIcons = ['🍎', '🍌', '🍇', '🍒', '🍎', '🍌', '🍇', '🍒'];
        let flippedCards = [];
        let moves = 0;
        let matchedPairs = 0;
        let isLockBoard = false;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            const shuffledIcons = shuffle([...cardIcons]);

            shuffledIcons.forEach((icon) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.icon = icon;

                card.innerHTML = `
                    <div class="card-face card-front">?</div>
                    <div class="card-face card-back">${icon}</div>
                `;

                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (isLockBoard) return;
            if (this.classList.contains('flipped')) return;

            this.classList.add('flipped');
            flippedCards.push(this);

            moves++;
            document.getElementById('move-count').innerText = moves;

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            isLockBoard = true;
            const [card1, card2] = flippedCards;

            if (card1.dataset.icon === card2.dataset.icon) {
                matchedPairs++;
                flippedCards = [];
                isLockBoard = false;

                if (matchedPairs === cardIcons.length / 2) {
                    setTimeout(() => {
                        alert(`Chúc mừng! Bạn đã thắng sau ${moves} lượt click!`);
                    }, 500);
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isLockBoard = false;
                }, 1000);
            }
        }

        function resetGame() {
            moves = 0;
            matchedPairs = 0;
            flippedCards = [];
            isLockBoard = false;
            document.getElementById('move-count').innerText = moves;
            createBoard();
        }

        // Khởi tạo game lần đầu
        createBoard();
    </script>
</body>
</html>
